# ============================================================
# Cloud Build — Cross-Species Causal Atlas
# GitHub push → Cloud Build → Cloud Run 자동 배포 (refimed 방식)
#
# 트리거 설정: GCP Console → Cloud Build → Triggers → Create
#   Source: GitHub (brigs1/causal-atlas), Branch ^main$, Config: cloudbuild.yaml
# 시크릿: Secret Manager 에 openai-api-key (OpenAI 키)
# ============================================================
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build','-f','docker/Dockerfile',
           '-t','gcr.io/$PROJECT_ID/causal-atlas:$BUILD_ID',
           '-t','gcr.io/$PROJECT_ID/causal-atlas:latest','.']
    id: build
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push','gcr.io/$PROJECT_ID/causal-atlas:$BUILD_ID']
    id: push
    waitFor: ['build']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - causal-atlas
      - --image
      - gcr.io/$PROJECT_ID/causal-atlas:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 512Mi
      - --cpu
      - '1'
      - --min-instances
      - '1'
      - --max-instances
      - '5'
      - --set-secrets
      - OPENAI_API_KEY=openai-api-key:latest
    id: deploy
    waitFor: ['push']
substitutions:
  _REGION: 'asia-northeast3'   # 서울
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
images:
  - 'gcr.io/$PROJECT_ID/causal-atlas:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/causal-atlas:latest'
timeout: '600s'
